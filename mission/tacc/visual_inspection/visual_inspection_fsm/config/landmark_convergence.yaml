tcp_offset:
  position:
    x: 0.0
    y: 0.0
    z: 0.0
  orientation:
    roll: 0.0
    pitch: 0.0
    yaw: 0.0
  mode: 0
  convergence_threshold: 0.1
  # How far to stop in front of the valve along its outward Z axis [m].
  # Positive = stay in front of valve face, negative = push into valve.
  valve_z_offset: 0.31 # good number for sim

standoff_waypoint:
  position:
    x: 0.0
    y: 0.0
    z: 1.0  # Standoff distance [m] along the valve's Z normal (outward from valve face).
  orientation:
    roll: 0.0
    pitch: 0.0
    # Yaw correction [deg] applied on top of the valve-normal-aligned heading.
    # The FSM aligns drone +X with the valve Z normal (plane normal pointing
    # toward the drone), then rotates by this many degrees around world/odom Z.
    # NOTE: values are in DEGREES (the YAML loader multiplies by pi/180).
    # Tune this if the drone arrives facing the wrong direction:
    #   +90.0  rotates clockwise   (right) when viewed from above in NED
    #   -90.0  rotates anticlockwise (left)
    yaw: 0.0
  mode: 0
  convergence_threshold: 0.3
