tcp_offset:  # Gripper tip position in base_link body frame (NED). Tweak to calibrate.
  position:
    x: 0.5331
    y: 0.0285
    z: -0.1155  # Negative z = gripper is above base_link center in NED
  orientation:
    roll: 0.0
    pitch: 0.0
    yaw: 0.0
  mode: 0
  convergence_threshold: 0.1

standoff_waypoint:  # Offset along valve normal for approach and retreat.
  position:
    x: 0.0
    y: 0.0
    z: 0.5  # 0.5m along valve outward normal
  orientation:
    roll: 0.0
    pitch: 0.0
    yaw: 0.0
  mode: 0
  convergence_threshold: 0.3
