pre_dock_landmark_convergence:
  position:
    x: 0.0
    y: 0.0
    z: -2.0  # 2m above the docking station landmark (NED: negative z = up)
  orientation:
    roll: 0.0
    pitch: 0.0
    yaw: 90.0
  mode: 0
  convergence_threshold: 0.5
  dead_reckoning_threshold: 2
  track_loss_timeout_sec: 15.0

power_puck_landmark_convergence:
  position:
    x: 0.06
    y: -0.005
    z: -0.23  # offset toward the power puck connector
  orientation:
    roll: 0.0
    pitch: 0.0
    yaw: 90.0
  mode: 0
  convergence_threshold: 0.3
  dead_reckoning_threshold: 1
  track_loss_timeout_sec: 10.0
