pre_dock_waypoint:  # Offset applied to polled landmark to navigate above the docking station.
  position:
    x: 0.0
    y: 0.0
    z: -2.0  # 2m above the docking station landmark (NED: negative z = up)
  orientation:
    roll: 0.0
    pitch: 0.0
    yaw: 0.0
  mode: 0
  convergence_threshold: 0.1

power_puck_waypoint:  # Offset applied to re-polled landmark to converge on the power puck connector.
  position:
    x: 0.06
    y: -0.005
    z: -0.23  # offset toward the power puck connector
  orientation:
    roll: 0.0
    pitch: 0.0
    yaw: 0.0
  mode: 0
  convergence_threshold: 0.1
